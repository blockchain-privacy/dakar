version: v26.2.0

dsn: memory

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:8082
      allow_credentials: true
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
      exposed_headers:
        - Content-Type
        - Set-Cookie
  admin:
    base_url: http://kratos:4434/

session:
  whoami:
    required_aal: highest_available
  lifespan: 168h
selfservice:
  default_browser_return_url: http://localhost:8082/
  allowed_return_urls:
    - http://localhost:4455
    - http://localhost:8082/

  methods:
    password:
      enabled: true
    totp:
      config:
        # The "issuer" is the name in the TOTP application users see when getting a one-time password.
        issuer: <change_me>
      enabled: true
    code: # Enables "one-time code" method. Use 'link' to enable "magic link" method.
      enabled: true
      config:
        lifespan: 15m # Defines how long the code or link are valid for. Default: 1h.

  flows:
    error:
      ui_url: http://localhost:8082/error

    settings:
      ui_url: http://localhost:8082/settings/profile
      privileged_session_max_age: 15m
      required_aal: aal1

    recovery:
      enabled: true
      ui_url: http://localhost:8082/recovery
      use: code
      after:
        hooks:
          - hook: revoke_active_sessions

    verification:
      enabled: false
      ui_url: http://localhost:8082/verification
      after:
        default_browser_return_url: http://localhost:8082/

    logout:
      after:
        default_browser_return_url: http://localhost:8082/

    login:
      ui_url: http://localhost:8082/login

    registration:
      enabled: false
      ui_url: http://localhost:8082/registration
      after:
        password:
          hooks:
            - hook: session

log:
  level: warning
  format: json
  leak_sensitive_values: false

# Set via environment variables
#secrets:
#  cookie:
#    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE
#  cipher:
#    - 32-LONG-SECRET-NOT-SECURE-AT-ALL

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 8

identity:
  default_schema_id: default_v0
  schemas:
    - id: default_v0
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true

oauth2_provider:
  url: http://hydra:4445
  override_return_to: true