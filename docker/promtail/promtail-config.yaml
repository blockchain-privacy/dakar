---
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://<change_me>/loki/api/v1/push
    tenant_id: tenant1

scrape_configs:
  - job_name: journal
    journal:
      path: /var/log/journal
      max_age: 12h
      labels:
        job: journal
    relabel_configs:
      # services
      - source_labels:
          - __journal__systemd_unit
        target_label: unit
      # docker containers
      - source_labels:
          - __journal_container_name
        target_label: container
      - action: keep
        source_labels: [ __journal__systemd_unit ]
        regex: docker.service
