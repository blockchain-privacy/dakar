x-logging:
  &default-logging
  driver: "journald"
  options:
    tag: "{{.Name}}"

services:
  zero:
    image: dgraph/dgraph:v25.3.5
    container_name: zero
    volumes:
      - ${DGRAPH_PATH}:/dgraph
    ports:
      - "${CONTAINER_IP}:5080:5080"
      - "${CONTAINER_IP}:6080:6080"
    restart: unless-stopped
    command: dgraph zero --my=zero:5080 --telemetry "reports=false"
    networks:
      - dgraph_default

  alpha:
    image: dgraph/dgraph:v25.3.5
    container_name: alpha
    volumes:
      - ${DGRAPH_PATH}:/dgraph
    ports:
      - "${CONTAINER_IP}:8080:8080"
      - "${CONTAINER_IP}:9080:9080"
    expose:
      - 9080
    restart: unless-stopped
    command: dgraph alpha --my=alpha:7080 --zero=zero:5080 --security "whitelist=192.168.188.0:192.168.188.255,172.16.0.0:172.31.255.255" --limit "query-edge=10000000" --telemetry "reports=false"
    networks:
      - dgraph_default

  ratel:
    image: dgraph/ratel:latest
    container_name: ratel
    ports:
      - "${CONTAINER_IP}:8000:8000"
    expose:
      - 8000
    command: dgraph-ratel
    networks:
      - dgraph_default

  kratos:
    container_name: kratos
    image: oryd/kratos:v26.2.0
    depends_on:
      - postgres
    ports:
      - '4433:4433' # public
      - '4434:4434' # admin
    user: "1000:1000"
    environment:
      - DSN=postgres://${KRATOS_POSTGRES_USER}:${KRATOS_POSTGRES_PASSWORD}@postgres:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4
      #- LOG_LEVEL=trace
      - SQA_OPT_OUT=true
      - SECRETS_COOKIE=${KRATOS_SECRETS_COOKIE}
      - SECRETS_CIPHER=${KRATOS_SECRETS_CIPHER}
    command: serve -c /etc/config/kratos/kratos.yml --watch-courier ${KRATOS_DEV_CLI_PARAMETERS}
#    command: migrate sql -e up --yes
    volumes:
      - ./kratos:/etc/config/kratos
    networks:
      - dgraph_default
    logging: *default-logging

  hydra:
    container_name: hydra
    image: oryd/hydra:v26.2.0
    ports:
      - "4444:4444" # public
      - "4445:4445" # admin
      - "5555:5555" # token user
    user: "1000:1000"
    command: serve -c /etc/config/hydra/config.yml all --dev
#    command: migrate -c /etc/config/hydra/config.yml sql up -e --yes
    volumes:
      - ./hydra/sqlite:/var/lib/sqlite
      - ./hydra/config.yml:/etc/config/hydra/config.yml
    environment:
      - DSN=sqlite:///var/lib/sqlite/db.sqlite?_fk=true
    restart: unless-stopped
    networks:
      - dgraph_default
    logging: *default-logging

  postgres:
    container_name: postgres
    image: postgres:18.3
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${KRATOS_POSTGRES_USER}
      - POSTGRES_PASSWORD=${KRATOS_POSTGRES_PASSWORD}
      - POSTGRES_DB=kratos
    volumes:
      - ./kratos/postgres:/var/lib/postgresql
    networks:
      - dgraph_default

  mailslurper:
    container_name: mailslurper
    image: oryd/mailslurper:latest-smtps
    ports:
      - '4436:4436'
      - '4437:4437'
    networks:
      - dgraph_default

  dashd:
    image: dashpay/dashd:23.1
    container_name: dashd
    volumes:
      - ${DASH_PATH}:/home/dash
    ports:
      - "${CONTAINER_IP}:9999:9999"
      - "${CONTAINER_IP}:9998:9998"
    expose:
      - 9999
      - 9998
    command: dashd
    restart: unless-stopped
    networks:
      - dgraph_default

  wikiapi:
    image: registry.gitlab.com/blockchain-privacy/wikiapi:latest
    container_name: wikiapi
    volumes:
      - ./wikiapi/files:/data
      - ./wikiapi/config.yml:/config.yml
    ports:
      - "4567:4567"
    expose:
      - 4567
    networks:
      - dgraph_default

  kratosadmin:
    image: registry.gitlab.com/blockchain-privacy/kratosadmin:latest
    container_name: kratosadmin
    volumes:
      - ./kratosadmin/config.yml:/config.yml
    ports:
      - "9316:9316"
    expose:
      - 9316
    networks:
      - dgraph_default
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"

  oathkeeper:
    image: oryd/oathkeeper:v25.4.0
    container_name: oathkeeper
    user: "1000:1000"
    ports:
      - "4455:4455"
      - "4456:4456"
    command: serve proxy -c "/etc/config/oathkeeper/oathkeeper.yml" --sqa-opt-out
    restart: on-failure
    networks:
      - dgraph_default
    volumes:
      - ./oathkeeper:/etc/config/oathkeeper
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"

  keto:
    image: oryd/keto:v26.2.0
    container_name: keto
    ports:
      - "4466:4466"
      - "4467:4467"
    command: serve -c /home/ory/keto.yml --sqa-opt-out
    restart: on-failure
    volumes:
      - ./keto/keto.yml:/home/ory/keto.yml
      - ./keto/namespaces.ts:/home/ory/namespaces.ts
    networks:
      - dgraph_default

  keto-init:
    image: oryd/keto:v26.2.0
    container_name: keto-init
    depends_on:
      - keto
    environment:
      - KETO_WRITE_REMOTE=keto:4467
    volumes:
      - ./keto/relationships.json:/home/ory/relationships.json
    command: relation-tuple create -f /home/ory/relationships.json --insecure-disable-transport-security
    restart: on-failure
    networks:
      - dgraph_default

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./promtail/promtail-local-config.yaml:/etc/promtail/config.yaml:ro
      - /var/log/journal/:/var/log/journal/:ro
      - /etc/machine-id:/etc/machine-i:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - dgraph_default

