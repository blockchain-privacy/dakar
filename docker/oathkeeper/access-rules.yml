- id: "ory:wikiapi_protected"
  upstream:
    preserve_host: true
    url: "http://wikiapi:4567"
    strip_path: "/wiki"
  match:
    url: "http://localhost:4455/wiki/<.*>"
    methods:
      - GET
      - POST
  authenticators:
    - handler: oauth2_introspection
    - handler: cookie_session
  authorizer:
    handler: allow
  mutators:
    - handler: noop

- id: "ory:kratosadmin_admin"
  upstream:
    preserve_host: true
    url: "http://kratosadmin:9316"
    strip_path: "/kratosadmin"
  match:
    url: "http://localhost:4455/kratosadmin/<(?!self|verify|logout).*>"
    methods:
      - GET
      - POST
      - DELETE
      - PUT
      - HEAD
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: remote_json
    config:
      remote: http://keto:4466/relation-tuples/check
      payload: |
        {
          "subject_id": "{{ .Extra.identity.metadata_public.roles.kratos_admin | print }}",
          "relation": "call",
          "namespace": "Service",
          "object": "kratosadmin_admin"
        }
  mutators:
    - handler: header

