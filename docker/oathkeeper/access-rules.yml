      - PUT
      - HEAD
  authenticators:
    - handler: oauth2_introspection
  authorizer:
    handler: remote_json
    config:
      remote: http://keto:4466/relation-tuples/check
      payload: |
        {
          "subject_id": "{{ .Extra.identity.metadata_public.roles.dakar_dash | print }}",
